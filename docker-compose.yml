version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: slides_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: slides_user
      POSTGRES_PASSWORD: slides_pass
      POSTGRES_DB: slides_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slides_user -d slides_platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Optional: pgAdmin for local database inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: slides_platform_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
    driver: local
