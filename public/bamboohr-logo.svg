<svg viewBox="0 0 320 72" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BambooHR">
  <!-- Bamboo sprout leaves -->
  <!-- Left leaf -->
  <path d="M28,44 C22,32 18,20 30,14 C31,22 32,33 37,40 Z" fill="white"/>
  <!-- Right leaf -->
  <path d="M37,40 C44,28 52,21 58,18 C57,28 50,38 41,43 Z" fill="white"/>
  <!-- Stem -->
  <line x1="37" y1="56" x2="37" y2="40" stroke="white" stroke-width="3" stroke-linecap="round"/>

  <!-- "bamboo" wordmark -->
  <text
    x="64" y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="700"
    fill="white"
    letter-spacing="-0.3"
  >bamboo</text>

  <!-- "HR" wordmark -->
  <text
    x="237" y="50"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="900"
    fill="white"
    letter-spacing="1"
  >HR</text>

  <!-- Registered mark -->
  <text
    x="294" y="35"
    font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif"
    font-size="11"
    fill="white"
  >®</text>
</svg>
